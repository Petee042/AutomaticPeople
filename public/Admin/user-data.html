<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Data Dump - AutomaticPeople</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="header-left">
      <a href="/Admin/index.html" class="back-arrow-control" aria-label="Back"></a>
      <a class="top-brand-link" href="/Admin/index.html" aria-label="AutomaticPeople admin home">
        <img class="top-brand-logo" src="/images/Icon.jpg" alt="AutomaticPeople logo" />
      </a>
    </div>
    <button id="adminLogoutBtn" class="btn secondary">Log Out</button>
  </header>

  <main class="dashboard">
    <div class="card-container wide admin-card">
      <h2>User Data Dump</h2>
      <p class="hint">Full stored data for the selected user is shown below as JSON.</p>
      <p id="userDataMessage" class="message" aria-live="polite"></p>

      <section class="listing-form-section">
        <div class="calendar-source-row">
          <label for="userDataUserId">User ID</label>
          <input id="userDataUserId" type="text" readonly />
        </div>
        <p id="userDataSummary" class="hint">Loading user data...</p>
        <div class="table-wrap">
          <pre id="userDataDump" style="margin:0; white-space:pre-wrap; word-break:break-word; background:#fff; border:1px solid #d9d9d9; border-radius:12px; padding:1rem; max-height:70vh; overflow:auto;">Loading user data...</pre>
        </div>
      </section>
    </div>
  </main>

  <script src="/Admin/user-data.js"></script>
</body>
</html>
